<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Live Workspace | TutorNest</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .workspace-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
    canvas {
      cursor: crosshair;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-body-md h-screen flex flex-col overflow-hidden">
  
  <!-- Header -->
  <header class="bg-slate-950/80 border-b border-slate-800 backdrop-blur-md px-6 py-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white">
        <span class="material-symbols-outlined">school</span>
      </div>
      <div>
        <h1 class="font-display-md text-lg font-bold bg-gradient-to-r from-violet-400 to-indigo-300 bg-clip-text text-transparent" id="session-subject">Loading Subject...</h1>
        <p class="text-xs text-slate-400" id="session-participant">Connecting...</p>
      </div>
    </div>

    <!-- Timer Widget -->
    <div class="flex items-center gap-6">
      <div class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl flex items-center gap-2 font-mono">
        <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-sm font-semibold tracking-wider" id="session-timer">00:00:00</span>
      </div>
      <button id="end-session-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-5 py-2.5 rounded-xl font-medium transition-all hover:scale-105 active:scale-95 flex items-center gap-2 text-sm shadow-lg shadow-rose-900/30">
        <span class="material-symbols-outlined text-sm">call_end</span>
        End Session
      </button>
    </div>
  </header>

  <!-- Workspace Container -->
  <main class="flex-1 flex overflow-hidden min-h-0 bg-slate-950">
    <!-- Left: Video Call Iframe -->
    <section class="w-1/2 p-4 flex flex-col h-full border-r border-slate-800">
      <div class="flex items-center justify-between mb-3 shrink-0">
        <h2 class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
          <span class="material-symbols-outlined text-primary text-[18px]">videocam</span>
          Live Video Stream
        </h2>
        <span class="text-[11px] text-slate-400 bg-slate-900 border border-slate-800 px-2 py-0.5 rounded-full">Embedded Call</span>
      </div>
      <div class="flex-1 bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden relative" id="video-container">
        <!-- Iframe will load here -->
        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 gap-2 bg-slate-950">
          <span class="material-symbols-outlined text-[48px] animate-spin text-primary">sync</span>
          <p class="text-sm">Connecting to secure video server...</p>
        </div>
      </div>
    </section>

    <!-- Right: Whiteboard & Code Pad Tabs -->
    <section class="w-1/2 p-4 flex flex-col h-full overflow-hidden">
      <!-- Tabs Selector -->
      <div class="flex items-center justify-between mb-3 shrink-0">
        <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
          <button id="tab-whiteboard-btn" class="px-4 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-white transition-all flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[16px]">gesture</span>
            Shared Whiteboard
          </button>
          <button id="tab-notes-btn" class="px-4 py-1.5 rounded-lg text-xs font-semibold text-slate-400 hover:text-white transition-all flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[16px]">description</span>
            Session Notes
          </button>
        </div>
        <span class="text-[11px] text-slate-400 bg-slate-900 border border-slate-800 px-2 py-0.5 rounded-full" id="tool-status">Tool Active</span>
      </div>

      <!-- Content Views -->
      <div class="flex-1 bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex flex-col relative">
        
        <!-- Whiteboard View -->
        <div id="whiteboard-view" class="flex-1 flex flex-col h-full relative">
          <!-- Canvas drawing tools -->
          <div class="absolute top-3 left-3 bg-slate-950/90 border border-slate-800 p-2 rounded-xl flex items-center gap-3 z-10 shadow-xl backdrop-blur-md">
            <!-- Colors -->
            <div class="flex items-center gap-1.5">
              <button class="w-6 h-6 rounded-full bg-white border border-slate-600 active:scale-90 transition-transform color-btn selected" data-color="#ffffff"></button>
              <button class="w-6 h-6 rounded-full bg-amber-400 active:scale-90 transition-transform color-btn" data-color="#fbbf24"></button>
              <button class="w-6 h-6 rounded-full bg-rose-500 active:scale-90 transition-transform color-btn" data-color="#f43f5e"></button>
              <button class="w-6 h-6 rounded-full bg-emerald-500 active:scale-90 transition-transform color-btn" data-color="#10b981"></button>
              <button class="w-6 h-6 rounded-full bg-sky-500 active:scale-90 transition-transform color-btn" data-color="#0ea5e9"></button>
            </div>
            
            <div class="h-6 w-px bg-slate-800"></div>

            <!-- Brush Size -->
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-slate-400 text-[18px]">line_weight</span>
              <input type="range" min="1" max="20" value="3" id="brush-size" class="w-20 accent-primary bg-slate-800 h-1 rounded-lg border-none focus:ring-0">
            </div>

            <div class="h-6 w-px bg-slate-800"></div>

            <!-- Tools -->
            <div class="flex items-center gap-1.5">
              <button id="tool-eraser" class="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-colors" title="Eraser">
                <span class="material-symbols-outlined text-[18px]">backspace</span>
              </button>
              <button id="tool-clear" class="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-rose-400 transition-colors" title="Clear Canvas">
                <span class="material-symbols-outlined text-[18px]">delete</span>
              </button>
            </div>
          </div>
          <canvas id="paint-canvas" class="flex-1 w-full bg-slate-900"></canvas>
        </div>

        <!-- Session Notes View -->
        <div id="notes-view" class="hidden flex-1 flex flex-col h-full p-4">
          <textarea id="notes-textarea" placeholder="Start typing your class notes, code snippets, or homework solutions here... (Auto-saves locally)" class="flex-1 w-full p-4 bg-slate-950 border border-slate-800 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl text-slate-200 font-mono text-sm resize-none outline-none"></textarea>
          <div class="flex items-center justify-between mt-3 shrink-0">
            <span class="text-xs text-slate-400">Class notes are downloadable in text format.</span>
            <button id="download-notes-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl font-medium text-xs transition-colors flex items-center gap-1.5">
              <span class="material-symbols-outlined text-sm">download</span>
              Download Notes
            </button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/pages/session.js"></script>
</body>
</html>
