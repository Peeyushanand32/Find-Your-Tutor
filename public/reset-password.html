<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TutorNest</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1A56DB',
                        secondary: '#7C3AED',
                        surface: '#F9FAFB',
                        'on-surface': '#111827',
                        'on-surface-variant': '#4B5563',
                        'outline-variant': '#E5E7EB',
                        error: '#DC2626'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #F3F4F6 0%, #E5E7EB 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/80 backdrop-blur-xl border border-outline-variant/60 w-full max-w-md p-8 rounded-2xl shadow-2xl space-y-6">
        
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">TutorNest</h1>
            <h2 class="text-xl font-semibold text-on-surface">Create New Password</h2>
            <p class="text-sm text-on-surface-variant">Please choose a strong, secure password for your account.</p>
        </div>

        <!-- Success/Error Banners -->
        <div id="errorAlert" class="hidden bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-[20px]">error</span>
            <span id="errorText"></span>
        </div>
        <div id="successAlert" class="hidden bg-green-50 border border-green-200 text-green-700 p-4 rounded-xl text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-[20px]">check_circle</span>
            <span>Password reset successfully! Redirecting to home...</span>
        </div>

        <form id="resetForm" class="space-y-4">
            <div class="space-y-1">
                <label class="text-sm font-medium text-on-surface-variant">New Password</label>
                <input type="password" id="password" required minlength="6" placeholder="••••••••" class="w-full px-4 py-2.5 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none">
            </div>

            <div class="space-y-1">
                <label class="text-sm font-medium text-on-surface-variant">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="6" placeholder="••••••••" class="w-full px-4 py-2.5 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none">
            </div>

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary to-secondary text-white font-semibold rounded-xl shadow-lg hover:scale-[1.01] active:scale-95 transition-all">
                Reset Password
            </button>
        </form>

    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            const successAlert = document.getElementById('successAlert');
            
            errorAlert.classList.add('hidden');
            successAlert.classList.add('hidden');

            if (password !== confirmPassword) {
                errorText.textContent = "Passwords do not match.";
                errorAlert.classList.remove('hidden');
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                errorText.textContent = "Invalid or missing password reset token.";
                errorAlert.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (res.ok) {
                    successAlert.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '/index.html?login=true';
                    }, 2000);
                } else {
                    errorText.textContent = data.error || "Password reset failed.";
                    errorAlert.classList.remove('hidden');
                }
            } catch (err) {
                errorText.textContent = "Connection error. Please try again.";
                errorAlert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
